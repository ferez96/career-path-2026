name: wisp-ci

on:
  pull_request:
    paths:
      - "packages/wisp/**"
      - ".github/workflows/wisp-ci.yml"
  push:
    branches: [master]
    paths:
      - "packages/wisp/**"
      - ".github/workflows/wisp-ci.yml"

defaults:
  run:
    working-directory: packages/wisp

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: packages/wisp/pyproject.toml
      - name: Install package + dev extras
        run: pip install -e ".[dev]"
      - name: Ruff (lint)
        run: ruff check src tests
      - name: Mypy (strict)
        run: mypy src
      - name: Pytest
        run: pytest

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          pip install build
          python -m build
      - name: List wheel contents
        run: |
          set -e
          wheel=$(ls dist/*.whl | head -1)
          echo "Built: $wheel"
          python -c "import zipfile, sys; zf=zipfile.ZipFile(sys.argv[1]); [print(n) for n in zf.namelist()]" "$wheel"
      - uses: actions/upload-artifact@v4
        with:
          name: wisp-dist
          path: packages/wisp/dist/*
