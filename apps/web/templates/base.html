<!doctype html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Career Path Assistant</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous" />
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <style>
    pre { white-space: pre-wrap; word-break: break-word; background: #1e1e2e; border-radius: 8px; padding: 12px; font-size: 13px; }
    .kpi-value { font-size: 1.8rem; font-weight: 700; }
    .kpi-label { font-size: 0.8rem; text-transform: uppercase; letter-spacing: .06em; opacity: .65; }
    code { color: #a6e3a1; }
    .table { --bs-table-striped-bg: rgba(255,255,255,.03); }
    .htmx-indicator { display: none; }
    .htmx-request .htmx-indicator { display: inline-block; }
  </style>
</head>
<body>
<nav class="navbar navbar-dark bg-dark border-bottom mb-4">
  <div class="container-xl">
    <span class="navbar-brand fw-bold">Career Path Assistant</span>
    <span class="text-muted small">
      <i class="bi bi-person"></i> Maintained by <a href="https://github.com/ferez96" class="link-secondary text-decoration-none" target="_blank" rel="noopener">Ferez96</a>
    </span>
  </div>
</nav>
{% block content %}{% endblock %}
</body>
</html>
