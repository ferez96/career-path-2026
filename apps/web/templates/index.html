{% extends "base.html" %}

{% block content %}
<div class="container-xl pb-5">
  <div class="row g-4">
    <div class="col-lg-5">
      <div class="card">
        <div class="card-header fw-semibold">Chat (tracked)</div>
        <div class="card-body">
          <form hx-post="/partials/chat"
                hx-target="#chat-result"
                hx-swap="innerHTML"
                hx-indicator="#chat-spinner"
                hx-on::after-request="htmx.ajax('GET', '/partials/dashboard?month=' + document.getElementById('month-input').value, {target:'#dashboard-content', swap:'innerHTML'})">
            <div class="mb-2">
              <label class="form-label small mb-1">Task type</label>
              <select name="task_type" class="form-select form-select-sm">
                <option value="weekly-planning">weekly-planning</option>
                <option value="opportunity-update">opportunity-update</option>
                <option value="opportunity-from-jd">opportunity-from-jd</option>
                <option value="company-brief">company-brief</option>
              </select>
            </div>
            <div class="row g-2 mb-2">
              <div class="col">
                <label class="form-label small mb-1">Provider</label>
                <input name="provider" class="form-control form-control-sm" value="openai" />
              </div>
              <div class="col">
                <label class="form-label small mb-1">Model</label>
                <select name="model" class="form-select form-select-sm">
                  <option value="gpt-4.1-mini">gpt-4.1-mini</option>
                  <option value="gpt-4.1">gpt-4.1</option>
                </select>
              </div>
            </div>
            <div class="mb-3">
              <label class="form-label small mb-1">Prompt</label>
              <textarea name="prompt" class="form-control form-control-sm" rows="4">Summarize 3 priorities for this week.</textarea>
            </div>
            <div class="mb-3">
              <label class="form-label small mb-1">Attached file paths (comma/newline separated)</label>
              <textarea name="attached_paths" class="form-control form-control-sm" rows="3" placeholder="data/weekly/2026-W17.md&#10;docs/CURSOR.md"></textarea>
              <div class="form-text">Allowed roots: <code>data/</code>, <code>docs/</code>, <code>templates/</code>, <code>config/</code></div>
            </div>
            <input type="hidden" name="source" value="manual_logs" />
            <div class="d-flex align-items-center gap-2">
              <button type="submit" class="btn btn-primary btn-sm">Send</button>
              <div id="chat-spinner" class="spinner-border spinner-border-sm text-secondary htmx-indicator" role="status">
                <span class="visually-hidden">Loading...</span>
              </div>
            </div>
          </form>
          <div id="chat-result" class="mt-3"></div>
        </div>
      </div>
    </div>

    <div id="dashboard-content" class="col-lg-7">
      {% include "partials/dashboard.html" %}
    </div>
  </div>
</div>
{% endblock %}
